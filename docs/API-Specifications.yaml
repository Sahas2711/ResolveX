openapi: 3.1.0
info:
  title: ResolveX – Intelligent Complaint & Ticket Management Platform
  description: >
    Enterprise-grade REST API for complaint lifecycle management,
    auto‑assignment, role‑based access control, dashboards, and notifications.
  version: 1.0.0
  contact:
    name: ResolveX API Support
    email: api-support@resolvex.com

servers:
  - url: https://api.resolvex.com/api/v1
    description: Production
  - url: https://staging-api.resolvex.com/api/v1
    description: Staging

tags:
  - name: Auth
    description: Authentication & token management
  - name: Users
    description: User management (admin only)
  - name: Roles
    description: Role CRUD & assignment
  - name: Permissions
    description: Permission listing & creation
  - name: Products
    description: Product catalog & SLA configuration
  - name: Teams
    description: Team structure & members
  - name: Complaints
    description: Ticket lifecycle, comments, attachments, timeline
  - name: Notifications
    description: User notifications
  - name: Dashboard
    description: Real‑time analytics & KPIs
  - name: Analytics
    description: Cross‑entity performance summaries
  - name: System
    description: Global system settings
  - name: Webhooks
    description: Event subscriptions

security:
  - BearerAuth: []

paths:
  # ===================== AUTH =====================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new customer account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
                password:
                  type: string
                  format: password
                  minLength: 8
                  maxLength: 128
                  pattern: '^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,}$'
                  description: 'At least 1 uppercase, 1 lowercase, 1 digit, 1 special character'
                name:
                  type: string
                  maxLength: 150
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRegisteredResponse'
        '409':
          $ref: '#/components/responses/Conflict'
        '422':
          $ref: '#/components/responses/ValidationError'

  /auth/login:
    post:
      tags: [Auth]
      summary: Authenticate and receive access/refresh tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string, format: password }
      responses:
        '200':
          description: Tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange refresh token for new access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New access token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Revoke refresh token
      security: [{ BearerAuth: [] }]
      responses:
        '204':
          description: Successfully logged out

  # ===================== USERS =====================
  /users:
    get:
      tags: [Users]
      summary: List/search users (admin)
      security: [{ BearerAuth: [user:read] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: search
          in: query
          schema: { type: string }
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedUsersResponse'
        '403': { $ref: '#/components/responses/Forbidden' }

  /users/me:
    get:
      tags: [Users]
      summary: Get current logged‑in user profile
      security: [{ BearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }

  /users/{userId}:
    get:
      tags: [Users]
      summary: Get user details (admin or self)
      security: [{ BearerAuth: [user:read] }]
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Users]
      summary: Update user (admin)
      security: [{ BearerAuth: [user:update] }]
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 150 }
                email: { type: string, format: email }
                isActive: { type: boolean }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Users]
      summary: Soft‑delete user (admin)
      security: [{ BearerAuth: [user:delete] }]
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      responses:
        '204': { description: Deleted }
        '409': { $ref: '#/components/responses/Conflict' }

  /users/{userId}/roles:
    post:
      tags: [Users]
      summary: Assign role(s) to a user
      security: [{ BearerAuth: [user:manage] }]
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [roleIds]
              properties:
                roleIds:
                  type: array
                  minItems: 1
                  items: { type: string, format: uuid }
      responses:
        '200':
          description: Roles assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Users]
      summary: Revoke a specific role from user
      security: [{ BearerAuth: [user:manage] }]
      parameters:
        - $ref: '#/components/parameters/UserIdParam'
        - name: roleId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Role revoked }
        '404': { $ref: '#/components/responses/NotFound' }

  # ===================== ROLES =====================
  /roles:
    get:
      tags: [Roles]
      summary: List all roles
      security: [{ BearerAuth: [role:read] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedRolesResponse'
    post:
      tags: [Roles]
      summary: Create a new role
      security: [{ BearerAuth: [role:create] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 50 }
                permissionIds:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '422': { $ref: '#/components/responses/ValidationError' }

  /roles/{roleId}:
    get:
      tags: [Roles]
      summary: Get role details
      security: [{ BearerAuth: [role:read] }]
      parameters:
        - $ref: '#/components/parameters/RoleIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
    put:
      tags: [Roles]
      summary: Update role (name & permissions)
      security: [{ BearerAuth: [role:update] }]
      parameters:
        - $ref: '#/components/parameters/RoleIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, maxLength: 50 }
                permissionIds:
                  type: array
                  items: { type: string, format: uuid }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RoleResponse'
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Roles]
      summary: Delete a role (if not assigned)
      security: [{ BearerAuth: [role:delete] }]
      parameters:
        - $ref: '#/components/parameters/RoleIdParam'
      responses:
        '204': { description: Deleted }
        '409': { $ref: '#/components/responses/Conflict' }

  # ===================== PERMISSIONS =====================
  /permissions:
    get:
      tags: [Permissions]
      summary: List all permissions
      security: [{ BearerAuth: [permission:read] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPermissionsResponse'
    post:
      tags: [Permissions]
      summary: Create a new permission (admin only)
      security: [{ BearerAuth: [permission:create] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  maxLength: 100
                  pattern: '^[a-z]+:[a-z]+(:[a-z]+)?$'
                  description: 'Format: domain:action[:subresource] (e.g., complaint:create)'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionResponse'
        '422': { $ref: '#/components/responses/ValidationError' }

  # ===================== PRODUCTS =====================
  /products:
    get:
      tags: [Products]
      summary: List products with search, filter, pagination
      security: [{ BearerAuth: [product:read] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string, enum: [active, inactive] }
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedProductsResponse'
    post:
      tags: [Products]
      summary: Create a new product
      security: [{ BearerAuth: [product:create] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreateRequest'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '422': { $ref: '#/components/responses/ValidationError' }

  /products/{productId}:
    get:
      tags: [Products]
      summary: Get product details
      security: [{ BearerAuth: [product:read] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Products]
      summary: Update product
      security: [{ BearerAuth: [product:update] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpdateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Products]
      summary: Delete product (if no active complaints)
      security: [{ BearerAuth: [product:delete] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '204': { description: Deleted }
        '409': { $ref: '#/components/responses/Conflict' }

  /products/{productId}/categories:
    get:
      tags: [Products]
      summary: List product categories
      security: [{ BearerAuth: [product:read] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductCategory'
    post:
      tags: [Products]
      summary: Add category to product
      security: [{ BearerAuth: [product:update] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 100 }
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductCategory'
        '404': { $ref: '#/components/responses/NotFound' }

  /products/{productId}/sla:
    get:
      tags: [Products]
      summary: Get SLA rules for product
      security: [{ BearerAuth: [product:read] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SLARule'
    put:
      tags: [Products]
      summary: Set SLA rules (replaces all)
      security: [{ BearerAuth: [product:update] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/SLARule'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SLARule'

  /products/{productId}/teams:
    get:
      tags: [Products]
      summary: List teams mapped to product
      security: [{ BearerAuth: [product:read] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductTeamMapping'
    post:
      tags: [Products]
      summary: Map a team to product
      security: [{ BearerAuth: [product:update] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamId]
              properties:
                teamId: { type: string, format: uuid }
                isPrimary: { type: boolean, default: false }
                loadWeight: { type: number, minimum: 0.1, default: 1.0 }
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductTeamMapping'
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Products]
      summary: Remove team mapping
      security: [{ BearerAuth: [product:update] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
        - name: teamId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Removed }

  # ===================== TEAMS =====================
  /teams:
    get:
      tags: [Teams]
      summary: List all teams
      security: [{ BearerAuth: [team:read] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: search
          in: query
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTeamsResponse'
    post:
      tags: [Teams]
      summary: Create a new team
      security: [{ BearerAuth: [team:create] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 100 }
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'

  /teams/{teamId}:
    get:
      tags: [Teams]
      summary: Get team details
      security: [{ BearerAuth: [team:read] }]
      parameters:
        - $ref: '#/components/parameters/TeamIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'
    put:
      tags: [Teams]
      summary: Update team name
      security: [{ BearerAuth: [team:update] }]
      parameters:
        - $ref: '#/components/parameters/TeamIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, maxLength: 100 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamResponse'

  /teams/{teamId}/members:
    get:
      tags: [Teams]
      summary: List team members
      security: [{ BearerAuth: [team:read] }]
      parameters:
        - $ref: '#/components/parameters/TeamIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamMember'
    post:
      tags: [Teams]
      summary: Add member to team
      security: [{ BearerAuth: [team:update] }]
      parameters:
        - $ref: '#/components/parameters/TeamIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, role]
              properties:
                userId: { type: string, format: uuid }
                role: { type: string, enum: [lead, member] }
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMember'
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      tags: [Teams]
      summary: Remove member from team
      security: [{ BearerAuth: [team:update] }]
      parameters:
        - $ref: '#/components/parameters/TeamIdParam'
        - name: userId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Removed }

  # ===================== COMPLAINTS =====================
  /complaints:
    get:
      tags: [Complaints]
      summary: Global search and filter complaints
      security: [{ BearerAuth: [complaint:read:all] }]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - name: search
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ComplaintStatus'
            style: form
            explode: false
        - name: priority
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Priority'
            style: form
            explode: false
        - name: severity
          in: query
          schema:
            type: array
            items:
              $ref: '#/components/schemas/Severity'
            style: form
            explode: false
        - name: product
          in: query
          schema: { type: string, format: uuid }
        - name: team
          in: query
          schema: { type: string, format: uuid }
        - name: agent
          in: query
          schema: { type: string, format: uuid }
        - name: dateFrom
          in: query
          schema: { type: string, format: date-time }
        - name: dateTo
          in: query
          schema: { type: string, format: date-time }
        - name: slaStatus
          in: query
          schema: { type: string, enum: [breached, at_risk, compliant] }
        - $ref: '#/components/parameters/SortParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedComplaintsResponse'
    post:
      tags: [Complaints]
      summary: Create a new complaint (triggers auto‑assignment)
      security: [{ BearerAuth: [complaint:create] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintCreateRequest'
      responses:
        '201':
          description: Complaint created and assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplaintResponse'
        '422': { $ref: '#/components/responses/ValidationError' }

  /complaints/status:
    patch:
      tags: [Complaints]
      summary: Bulk update status for multiple complaints
      security: [{ BearerAuth: [complaint:update:status] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [complaintIds, status]
              properties:
                complaintIds:
                  type: array
                  minItems: 1
                  items: { type: string, format: uuid }
                status:
                  $ref: '#/components/schemas/ComplaintStatus'
                comment: { type: string, maxLength: 500 }
      responses:
        '200':
          description: Bulk update results
          content:
            application/json:
              schema:
                type: object
                properties:
                  updatedCount: { type: integer }
                  failedIds: { type: array, items: { type: string } }
                  errors: { type: array, items: { $ref: '#/components/schemas/ErrorDetail' } }
        '422': { $ref: '#/components/responses/ValidationError' }

  /complaints/{complaintId}:
    get:
      tags: [Complaints]
      summary: Get complaint full details
      security: [{ BearerAuth: [complaint:read:own, complaint:read:all] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplaintResponse'
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Complaints]
      summary: Update complaint fields (description, priority, severity)
      security: [{ BearerAuth: [complaint:update] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplaintUpdateRequest'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplaintResponse'
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /complaints/{complaintId}/status:
    post:
      tags: [Complaints]
      summary: Change complaint status (single)
      security: [{ BearerAuth: [complaint:update:status] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: '#/components/schemas/ComplaintStatus' }
                comment: { type: string, maxLength: 1000 }
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplaintResponse'
        '409': { description: Invalid status transition }
        '422': { $ref: '#/components/responses/ValidationError' }

  /complaints/{complaintId}/assign:
    post:
      tags: [Complaints]
      summary: Manual reassignment (team lead/admin)
      security: [{ BearerAuth: [complaint:reassign] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [teamId, staffId]
              properties:
                teamId: { type: string, format: uuid }
                staffId: { type: string, format: uuid }
                reason: { type: string, maxLength: 200 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssignmentResponse'
        '404': { $ref: '#/components/responses/NotFound' }

  /complaints/{complaintId}/escalate:
    post:
      tags: [Complaints]
      summary: Escalate complaint (triggers escalation rules)
      security: [{ BearerAuth: [complaint:escalate] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
                targetTeamId: { type: string, format: uuid }
      responses:
        '200':
          description: Escalation processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplaintResponse'

  /complaints/{complaintId}/resolve:
    post:
      tags: [Complaints]
      summary: Submit resolution details
      security: [{ BearerAuth: [complaint:resolve] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resolutionNotes]
              properties:
                resolutionNotes: { type: string, maxLength: 2000 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplaintResponse'

  /complaints/{complaintId}/close:
    post:
      tags: [Complaints]
      summary: Close the complaint
      security: [{ BearerAuth: [complaint:close] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                finalComment: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplaintResponse'

  /complaints/{complaintId}/reopen:
    post:
      tags: [Complaints]
      summary: Reopen a closed/resolved complaint
      security: [{ BearerAuth: [complaint:reopen] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string, maxLength: 500 }
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplaintResponse'

  /complaints/{complaintId}/comments:
    get:
      tags: [Complaints]
      summary: List comments on complaint
      security: [{ BearerAuth: [complaint:read:own, complaint:read:all] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCommentsResponse'
    post:
      tags: [Complaints]
      summary: Add comment (internal or public)
      security: [{ BearerAuth: [complaint:comment] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string, maxLength: 2000 }
                internal: { type: boolean, default: false }
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentResponse'

  /complaints/{complaintId}/attachments:
    get:
      tags: [Complaints]
      summary: List attachments
      security: [{ BearerAuth: [complaint:read:own, complaint:read:all] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Attachment'
    post:
      tags: [Complaints]
      summary: Upload attachment
      security: [{ BearerAuth: [complaint:update] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: 'Allowed extensions: jpg, png, pdf, docx (max 10 MB)'
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '422': { $ref: '#/components/responses/ValidationError' }

  /complaints/{complaintId}/timeline:
    get:
      tags: [Complaints]
      summary: Unified chronological timeline of all activities
      security: [{ BearerAuth: [complaint:read:own, complaint:read:all] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedTimelineResponse'

  /complaints/{complaintId}/assignments:
    get:
      tags: [Complaints]
      summary: Assignment history for complaint
      security: [{ BearerAuth: [audit:read] }]
      parameters:
        - $ref: '#/components/parameters/ComplaintIdParam'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Assignment'

  # ===================== NOTIFICATIONS =====================
  /notifications:
    get:
