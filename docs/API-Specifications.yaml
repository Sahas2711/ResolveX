                $ref: '#/components/schemas/ProductMetricsResponse'

  /dashboard/executive:
    get:
      tags: [Dashboard]
      summary: Executive KPI dashboard
      security: [{ BearerAuth: [dashboard:executive] }]
      parameters:
        - $ref: '#/components/parameters/DateRangeParams'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecutiveDashboardResponse'

  # ===================== ANALYTICS =====================
  /analytics/staff-performance:
    get:
      tags: [Analytics]
      summary: Aggregated staff performance across all agents
      security: [{ BearerAuth: [dashboard:staff] }]
      parameters:
        - $ref: '#/components/parameters/DateRangeParams'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaffMetrics'

  /analytics/team-performance:
    get:
      tags: [Analytics]
      summary: Aggregated team performance
      security: [{ BearerAuth: [dashboard:team] }]
      parameters:
        - $ref: '#/components/parameters/DateRangeParams'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TeamMetrics'

  /analytics/product-performance:
    get:
      tags: [Analytics]
      summary: Product performance across all products
      security: [{ BearerAuth: [dashboard:product] }]
      parameters:
        - $ref: '#/components/parameters/DateRangeParams'
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProductMetrics'

  # ===================== SYSTEM =====================
  /system/settings:
    get:
      tags: [System]
      summary: Retrieve system settings
      security: [{ BearerAuth: [system:settings] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    additionalProperties: true
    put:
      tags: [System]
      summary: Update system settings
      security: [{ BearerAuth: [system:settings] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: true }
                  data:
                    type: object
                    additionalProperties: true

  # ===================== WEBHOOKS =====================
  /webhooks/subscriptions:
    get:
      tags: [Webhooks]
      summary: List webhook subscriptions
      security: [{ BearerAuth: [webhook:manage] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WebhookSubscription'
    post:
      tags: [Webhooks]
      summary: Register a webhook subscription
      security: [{ BearerAuth: [webhook:manage] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url: { type: string, format: uri }
                events:
                  type: array
                  minItems: 1
                  items: { $ref: '#/components/schemas/WebhookEventType' }
                secret: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookSubscription'

  /webhooks/subscriptions/{subscriptionId}:
    delete:
      tags: [Webhooks]
      summary: Delete webhook subscription
      security: [{ BearerAuth: [webhook:manage] }]
      parameters:
        - name: subscriptionId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Deleted }

# ===================== COMPONENTS =====================
components:
  securitySchemes:
    BearerAuth:
      type: oauth2
      flows:
        password:
          tokenUrl: /api/v1/auth/login
          refreshUrl: /api/v1/auth/refresh
          scopes:
            complaint:create: 'Create complaints'
            complaint:read:own: 'View own complaints'
            complaint:read:all: 'View all complaints'
            complaint:update: 'Update complaint fields'
            complaint:update:status: 'Change ticket status'
            complaint:reassign: 'Reassign tickets'
            complaint:escalate: 'Escalate complaints'
            complaint:resolve: 'Submit resolution'
            complaint:close: 'Close tickets'
            complaint:reopen: 'Reopen tickets'
            complaint:comment: 'Add comments'
            product:create: 'Create products'
            product:read: 'Read product data'
            product:update: 'Update products'
            product:delete: 'Delete products'
            team:create: 'Create teams'
            team:read: 'Read team data'
            team:update: 'Update teams'
            dashboard:staff: 'View staff dashboard'
            dashboard:team: 'View team dashboard'
            dashboard:product: 'View product dashboard'
            dashboard:executive: 'View executive dashboard'
            audit:read: 'Read audit logs'
            webhook:manage: 'Manage webhook subscriptions'
            user:read: 'Read user data'
            user:update: 'Update users'
            user:delete: 'Delete users'
            user:manage: 'Manage user roles'
            role:read: 'Read roles'
            role:create: 'Create roles'
            role:update: 'Update roles'
            role:delete: 'Delete roles'
            permission:read: 'Read permissions'
            permission:create: 'Create permissions'
            system:settings: 'Manage system settings'

  parameters:
    PageParam:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSizeParam:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    SortParam:
      name: sort
      in: query
      description: 'Sort field(s) prefixed with + (asc) or - (desc), comma separated'
      schema: { type: string, example: '-createdAt,+priority' }
    DateRangeParams:
      name: dateFrom
      in: query
      schema: { type: string, format: date-time }
      name: dateTo
      in: query
      schema: { type: string, format: date-time }
    UserIdParam:
      name: userId
      in: path
      required: true
      schema: { type: string, format: uuid }
    RoleIdParam:
      name: roleId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ProductIdParam:
      name: productId
      in: path
      required: true
      schema: { type: string, format: uuid }
    TeamIdParam:
      name: teamId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ComplaintIdParam:
      name: complaintId
      in: path
      required: true
      schema: { type: string, format: uuid }
    StaffIdParam:
      name: staffId
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    Unauthorized:
      description: Authentication failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'

  schemas:
    # ---------- Envelopes ----------
    ApiResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
    PaginationMeta:
      type: object
      properties:
        page: { type: integer }
        pageSize: { type: integer }
        totalItems: { type: integer }
        totalPages: { type: integer }

    # ---------- Error ----------
    ErrorDetail:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        traceId: { type: string }
    ErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        error: { $ref: '#/components/schemas/ErrorDetail' }
    ValidationErrorResponse:
      type: object
      properties:
        success: { type: boolean, example: false }
        error:
          type: object
          properties:
            code: { type: string, example: 'VALIDATION_ERROR' }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  message: { type: string }
                  constraint: { type: string }

    # ---------- Auth ----------
    TokenResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            accessToken: { type: string }
            refreshToken: { type: string }
            expiresIn: { type: integer }
            tokenType: { type: string, example: 'Bearer' }
    UserRegisteredResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        data:
          type: object
          properties:
            userId: { type: string, format: uuid }
            email: { type: string, format: email }
            message: { type: string, example: 'Registration successful. Please log in.' }

    # ---------- Users ----------
    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string }
        isActive: { type: boolean }
        roles: { type: array, items: { type: string } }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    UserResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/User' }
    PaginatedUsersResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/User' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }

    # ---------- Roles ----------
    Role:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        permissions: { type: array, items: { type: string } }
    RoleResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Role' }
    PaginatedRolesResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Role' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }

    # ---------- Permissions ----------
    Permission:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    PermissionResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Permission' }
    PaginatedPermissionsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Permission' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }

    # ---------- Products ----------
    Product:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        status: { type: string, enum: [active, inactive] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ProductCreateRequest:
      type: object
      required: [name]
      properties:
        name: { type: string, maxLength: 100 }
        description: { type: string, maxLength: 500 }
        status: { type: string, enum: [active, inactive], default: active }
    ProductUpdateRequest:
      type: object
      properties:
        name: { type: string, maxLength: 100 }
        description: { type: string, maxLength: 500 }
        status: { type: string, enum: [active, inactive] }
    ProductResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Product' }
    PaginatedProductsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Product' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    ProductCategory:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    SLARule:
      type: object
      properties:
        id: { type: string, format: uuid }
        severity: { $ref: '#/components/schemas/Severity' }
        priority: { $ref: '#/components/schemas/Priority' }
        firstResponseTimeMinutes: { type: integer }
        resolutionTimeMinutes: { type: integer }
    ProductTeamMapping:
      type: object
      properties:
        teamId: { type: string, format: uuid }
        teamName: { type: string }
        isPrimary: { type: boolean }
        loadWeight: { type: number }

    # ---------- Teams ----------
    Team:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
    TeamResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Team' }
    PaginatedTeamsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Team' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }
    TeamMember:
      type: object
      properties:
        userId: { type: string, format: uuid }
        userName: { type: string }
        role: { type: string, enum: [lead, member] }

    # ---------- Complaints ----------
    Priority:
      type: string
      enum: [low, medium, high, critical]
    Severity:
      type: string
      enum: [minor, major, critical]
    ComplaintStatus:
      type: string
      enum: [open, assigned, in_progress, waiting_for_customer, resolved, reopened, closed, escalated]
    Complaint:
      type: object
      properties:
        id: { type: string, format: uuid }
        ticketNumber: { type: string }
        userId: { type: string, format: uuid }
        product: { $ref: '#/components/schemas/Product' }
        category: { type: string }
        priority: { $ref: '#/components/schemas/Priority' }
        severity: { $ref: '#/components/schemas/Severity' }
        description: { type: string }
        assignedTeam: { $ref: '#/components/schemas/Team' }
        assignedStaff: { type: object, properties: { id: { type: string }, name: { type: string } } }
        currentStatus: { $ref: '#/components/schemas/ComplaintStatus' }
        resolutionNotes: { type: string }
        slaFirstResponseDeadline: { type: string, format: date-time }
        slaResolutionDeadline: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        closedAt: { type: string, format: date-time, nullable: true }
    ComplaintCreateRequest:
      type: object
      required: [productId, category, priority, severity, description]
      properties:
        productId: { type: string, format: uuid }
        category: { type: string }
        priority: { $ref: '#/components/schemas/Priority' }
        severity: { $ref: '#/components/schemas/Severity' }
        description: { type: string, minLength: 20, maxLength: 5000 }
    ComplaintUpdateRequest:
      type: object
      properties:
        priority: { $ref: '#/components/schemas/Priority' }
        severity: { $ref: '#/components/schemas/Severity' }
        description: { type: string, maxLength: 5000 }
        category: { type: string }
    ComplaintResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Complaint' }
    PaginatedComplaintsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Complaint' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }

    # ---------- Comments ----------
    Comment:
      type: object
      properties:
        id: { type: string, format: uuid }
        userId: { type: string }
        userName: { type: string }
        content: { type: string }
        internal: { type: boolean }
        createdAt: { type: string, format: date-time }
    CommentResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Comment' }
    PaginatedCommentsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Comment' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }

    # ---------- Attachments ----------
    Attachment:
      type: object
      properties:
        id: { type: string, format: uuid }
        fileName: { type: string }
        fileUrl: { type: string, format: uri }
        uploadedBy: { type: string, format: uuid }
        uploadedAt: { type: string, format: date-time }

    # ---------- Assignment ----------
    Assignment:
      type: object
      properties:
        id: { type: string, format: uuid }
        complaintId: { type: string, format: uuid }
        teamId: { type: string, format: uuid }
        staffId: { type: string, format: uuid, nullable: true }
        assignedBy: { type: string, enum: [system, lead, admin] }
        reason: { type: string }
        createdAt: { type: string, format: date-time }
    AssignmentResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Assignment' }

    # ---------- Timeline ----------
    TimelineEvent:
      type: object
      properties:
        id: { type: string, format: uuid }
        eventType: { type: string, enum: [status_change, assignment, comment, escalation, resolution, attachment] }
        actorId: { type: string, format: uuid }
        actorName: { type: string }
        eventData: { type: object }
        timestamp: { type: string, format: date-time }
    PaginatedTimelineResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/TimelineEvent' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }

    # ---------- Notifications ----------
    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        message: { type: string }
        isRead: { type: boolean }
        notificationType: { type: string, enum: [assignment, escalation, resolution, comment, sla_breach] }
        referenceId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
    NotificationResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/Notification' }
    PaginatedNotificationsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: array
              items: { $ref: '#/components/schemas/Notification' }
            meta: { $ref: '#/components/schemas/PaginationMeta' }

    # ---------- Dashboards ----------
    DashboardOverviewResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                totalComplaints: { type: integer }
                openComplaints: { type: integer }
                resolvedComplaints: { type: integer }
                closedComplaints: { type: integer }
                slaBreaches: { type: integer }
                averageResolutionTimeHours: { type: number }
                resolutionRate: { type: number }

    StaffMetrics:
      type: object
      properties:
        staffId: { type: string, format: uuid }
        staffName: { type: string }
        totalAssigned: { type: integer }
        completed: { type: integer }
        pending: { type: integer }
        reopened: { type: integer }
        escalated: { type: integer }
        avgResolutionTimeHours: { type: number }
        avgFirstResponseTimeMinutes: { type: number }
        productivityScore: { type: number }
    StaffMetricsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/StaffMetrics' }

    TeamMetrics:
      type: object
      properties:
        teamId: { type: string, format: uuid }
        teamName: { type: string }
        workload: { type: integer, description: 'Total open complaints' }
        backlog: { type: integer, description: 'Open complaints older than 30 days' }
        resolutionRate: { type: number }
        slaCompliance: { type: number }
        avgResolutionTimeHours: { type: number }
    TeamMetricsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/TeamMetrics' }

    ProductMetrics:
      type: object
      properties:
        productId: { type: string, format: uuid }
        productName: { type: string }
        totalComplaints: { type: integer }
        categoryBreakdown: { type: object, additionalProperties: { type: integer } }
        frequentIssues:
          type: array
          items:
            type: object
            properties:
              issue: { type: string }
              count: { type: integer }
        slaViolationRate: { type: number }
        resolutionTrend:
          type: array
          items:
            type: object
            properties:
              period: { type: string }
              count: { type: integer }
    ProductMetricsResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data: { $ref: '#/components/schemas/ProductMetrics' }

    ExecutiveDashboardResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              type: object
              properties:
                totalTickets: { type: integer }
                openTickets: { type: integer }
                resolvedToday: { type: integer }
                slaBreached: { type: integer }
                avgResolutionTime: { type: number }
                topTeams:
                  type: array
                  items: { $ref: '#/components/schemas/TeamMetrics' }
                topStaff:
                  type: array
                  items: { $ref: '#/components/schemas/StaffMetrics' }

    # ---------- Webhooks ----------
    WebhookEventType:
      type: string
      enum: [complaint.created, complaint.assigned, complaint.status_changed, complaint.sla_breached]
    WebhookSubscription:
      type: object
      properties:
        id: { type: string, format: uuid }
        url: { type: string, format: uri }
        events:
          type: array
          items: { $ref: '#/components/schemas/WebhookEventType' }
        secret: { type: string }
        createdAt: { type: string, format: date-time }

