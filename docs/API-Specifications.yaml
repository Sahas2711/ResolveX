                $ref: '#/components/schemas/DashboardOverviewResponse'

  /dashboard/staff/{staffId}:
    get:
      tags: [Dashboard]
      summary: Staff metrics
      security: [{ BearerAuth: [dashboard:staff] }]
      parameters:
        - $ref: '#/components/parameters/StaffIdParam'
        - $ref: '#/components/parameters/DateRangeParams'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffMetricsResponse'

  /dashboard/team/{teamId}:
    get:
      tags: [Dashboard]
      summary: Team metrics
      security: [{ BearerAuth: [dashboard:team] }]
      parameters:
        - $ref: '#/components/parameters/TeamIdParam'
        - $ref: '#/components/parameters/DateRangeParams'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TeamMetricsResponse'

  /dashboard/product/{productId}:
    get:
      tags: [Dashboard]
      summary: Product analytics
      security: [{ BearerAuth: [dashboard:product] }]
      parameters:
        - $ref: '#/components/parameters/ProductIdParam'
        - $ref: '#/components/parameters/DateRangeParams'
      responses:
        '200':
          content:
            application/json:
